<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Respond-O</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
  }

  section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }

  h1 {
    font-size: 80px;
    margin: 0;
  }

  h2 {
    font-size: 56px;
    max-width: 900px;
  }

  p {
    font-size: 22px;
    color: #aaa;
  }

  .dim {
    opacity: 0.2;
  }

  .panel {
    position: relative;
  }

  .chatbox {
    margin-top: 30px;
    background: #111;
    border-radius: 20px;
    padding: 20px;
    width: 320px;
    text-align: left;
    font-size: 16px;
    line-height: 1.5;
  }

  .msg {
    margin-bottom: 10px;
  }

  .user { color: #0af; }
  .bot { color: #0f0; }

  button {
    padding: 16px 32px;
    font-size: 18px;
    border-radius: 999px;
    border: none;
    background: white;
    color: black;
    cursor: pointer;
  }
</style>
</head>

<body>

<!-- HERO -->
<section class="panel" id="hero">
  <h1>Respond-O</h1>
</section>

<!-- PROBLEM -->
<section class="panel">
  <h2 class="dim">Your company’s knowledge is scattered.</h2>
</section>

<!-- BUILD -->
<section class="panel">
  <h2 class="dim">Docs. CRMs. Teams. Everywhere.</h2>
</section>

<!-- MAGIC -->
<section class="panel" id="magic">
  <div>
    <h2>Ask anything.</h2>
    <p>Get answers instantly.</p>

    <div class="chatbox" id="chat">
      <div class="msg user">You: Where is client invoice?</div>
      <div class="msg bot dim">Respond-O: Searching...</div>
    </div>
  </div>
</section>

<!-- INTEGRATION -->
<section class="panel">
  <h2 class="dim">Connected to everything you use.</h2>
  <p>CRMs · Microsoft Teams · Knowledge Bases</p>
</section>

<!-- CTA -->
<section class="panel">
  <div>
    <h2>One system. All answers.</h2>
    <button>Get Started</button>
  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

// PINNED STORY SCROLL
const panels = gsap.utils.toArray(".panel");

panels.forEach((panel, i) => {
  gsap.to(panel, {
    scrollTrigger: {
      trigger: panel,
      start: "top top",
      pin: true,
      pinSpacing: false,
    }
  });
});

// TEXT REVEAL
gsap.utils.toArray("h2").forEach((el) => {
  gsap.to(el, {
    opacity: 1,
    duration: 1,
    scrollTrigger: {
      trigger: el,
      start: "top 70%",
      scrub: true
    }
  });
});

// CHATBOT DEMO ANIMATION
ScrollTrigger.create({
  trigger: "#magic",
  start: "top center",
  onEnter: () => {
    gsap.to("#chat .bot", {
      opacity: 1,
      duration: 1,
      delay: 0.5,
      onComplete: () => {
        document.querySelector("#chat .bot").innerHTML =
          "Respond-O: Found it in Salesforce. Sent to your email.";
      }
    });
  }
});

// HERO INTRO
gsap.from("#hero h1", {
  opacity: 0,
  y: 50,
  duration: 1.5
});
</script>

</body>
</html>
