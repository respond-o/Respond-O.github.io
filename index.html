<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
  }

  section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    position: relative;
  }

  /* 🌈 Gradient backgrounds per section */
  #hero {
    background: radial-gradient(circle at 50% 50%, #111 0%, #000 70%);
  }

  .panel:nth-child(2) {
    background: linear-gradient(180deg, #000, #050505);
  }

  .panel:nth-child(3) {
    background: radial-gradient(circle at 20% 50%, #0a0a0a, #000);
  }

  #magic {
    background: radial-gradient(circle at 50% 50%, #001a1a, #000);
  }

  .panel:nth-child(5) {
    background: radial-gradient(circle at 80% 50%, #0a0a1a, #000);
  }

  .panel:last-child {
    background: linear-gradient(180deg, #000, #111);
  }

  /* ✨ Glow effects */
  section::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,150,255,0.15), transparent 70%);
    filter: blur(100px);
    z-index: 0;
  }

  section:nth-child(odd)::before {
    top: 10%;
    left: 20%;
  }

  section:nth-child(even)::before {
    bottom: 10%;
    right: 20%;
  }

  /* Keep text above glow */
  section > * {
    position: relative;
    z-index: 1;
  }

  h1 {
    font-size: 80px;
    margin: 0;
    letter-spacing: -2px;
  }

  h2 {
    font-size: 56px;
    max-width: 900px;
  }

  p {
    font-size: 22px;
    color: #aaa;
  }

  .dim {
    opacity: 0.2;
  }

  /* 💬 Chatbox polish */
  .chatbox {
    margin-top: 30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 20px;
    width: 320px;
    text-align: left;
    font-size: 16px;
    line-height: 1.5;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .msg {
    margin-bottom: 10px;
  }

  .user { color: #4cc9ff; }
  .bot { color: #00ffae; }

  button {
    padding: 16px 32px;
    font-size: 18px;
    border-radius: 999px;
    border: none;
    background: linear-gradient(90deg, #fff, #ddd);
    color: black;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
  }
</style>
